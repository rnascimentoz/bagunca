<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mario</title>
    <link rel="stylesheet" href="mariocss.css">
</head>
<body>
    
    <div class="jogo">
        
        <img src="Images/mario-walking.gif" alt="mario" class="mario">
        <img src="Images/bowser-walking.gif" alt="bowser" class="bowser">
        <img src="Images/clouds.png" alt="clouds" class="clouds">
        <img src="Images/peach-running.gif" alt="peach" class="peach">
        <img src="Images/pipe.png" alt="pipe" class="pipe">
        
        <img id="ghost" src="Images/ghost.gif" alt="ghost" class="ghost" style="display: none;">
        <h1 class="varela"> Eu te amo Mestre Varela</h1>
        <div id="score">Score: 0</div>
        <div id="time">Tempo: 0s</div>
        <div id="bowser-health"></div>
        <img id="win-image" src="Images/win.png" alt="win" style="display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 60%; max-width: 700px; z-index: 15; border: 10px solid #fff; box-shadow: 0 15px 35px rgba(0,0,0,0.4); border-radius: 30px;">
        <div id="game-over-screen" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255, 0, 0, 0.5); filter: blur(1px); z-index: 20; justify-content: center; align-items: center;">
            <button id="restart-button" style="padding: 20px; font-size: 24px; background: red; color: white; border: none; cursor: pointer;">Reiniciar</button>
        </div>
        <div id="win-screen" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: green; z-index: 20; justify-content: center; align-items: center; display: none;">
            <table id="win-table" style="width: 400px; background: white; padding: 30px; border: 4px solid black; font-family: 'Press Start 2P', cursive; font-size: 18px;">
                <tr><td>Score:</td><td id="final-score"></td></tr>
                <tr><td>Tempo:</td><td id="final-time"></td></tr>
                <tr><td>Tiros:</td><td id="final-shots"></td></tr>
                <tr><td>Pulos:</td><td id="final-jumps"></td></tr>
            </table>
            <div id="final-victory-banner" style="display:none; margin-top: 20px; padding: 20px; background: #f3f3f3; border: 4px dashed #555; font-family: 'Press Start 2P', cursive; font-size: 20px; color: #333; text-align: center;">🎂 Você Ganhou!</div>
            <div style="display: flex; gap: 20px; margin-top: 30px;">
                <button id="next-phase-button" style="padding: 20px; font-size: 24px; background: purple; color: white; border: none; cursor: pointer;">Ir para próxima fase</button>
                <button id="play-again-button" style="padding: 20px; font-size: 24px; background: blue; color: white; border: none; cursor: pointer;">Jogar Novamente</button>
            </div>
        </div>
        
    </div>

    <audio id="bg-music" preload="auto" loop>
        <source src="https://www.myinstants.com/media/sounds/super-mario-bros-theme-song.mp3" type="audio/mpeg">
    </audio>
    <audio id="gameover-music" preload="auto">
        <source src="https://www.myinstants.com/media/sounds/mario-game-over.mp3" type="audio/mpeg">
    </audio>
    <audio id="win-music" preload="auto">
        <source src="https://www.myinstants.com/media/sounds/mario-win.mp3" type="audio/mpeg">
    </audio>
    <audio id="victory-voice" preload="auto">
        <source src="https://www.myinstants.com/media/sounds/mario-lets-go.mp3" type="audio/mpeg">
    </audio>

    <script type="text/javascript" src="mariojs.js"></script>
</body>
</html>
